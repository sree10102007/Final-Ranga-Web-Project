{% extends 'layout.html' %}
{% block title %}Edit Ledger - Expenses Master{% endblock %}
{% block page_title %}EDIT LEDGER{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="{{ url_for('expense_ledgers') }}" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center" data-style="width:40px;height:40px;padding:0;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h4 class="fw-bold mb-0">Edit Ledger</h4>
                <p class="text-muted small mb-0">Update ledger details</p>
            </div>
        </div>
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-5">
                <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-dark">Ledger Name <span class="text-danger">*</span></label>
                        <input type="text" name="ledger_name" class="form-control rounded-3" required value="{{ ledger.ledger_name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-dark">Ledger Group</label>
                        <select name="ledger_group" class="form-select rounded-3">
                            {% for g in ledger_groups %}
                            <option value="{{ g }}" {% if ledger.ledger_group == g %}selected{% endif %}>{{ g }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-dark">Description</label>
                        <textarea name="description" class="form-control rounded-3" rows="2">{{ ledger.description or '' }}</textarea>
                    </div>
                    <div class="d-flex gap-3">
                        <a href="{{ url_for('expense_ledgers') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary rounded-pill px-5 fw-bold shadow-sm flex-grow-1">
                            <i class="bi bi-check2-circle me-2"></i>Update Ledger
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
