{% extends 'layout.html' %}
{% block title %}Edit Particular - Expenses Master{% endblock %}
{% block page_title %}EDIT PARTICULAR{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="{{ url_for('expense_ledgers', tab='particulars') }}" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center" style="width:40px;height:40px;padding:0;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h4 class="fw-bold mb-0">Edit Particular</h4>
                <p class="text-muted small mb-0">Update expense category details</p>
            </div>
        </div>
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-5">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-dark">Particular Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control rounded-3" required value="{{ particular.name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-dark">Linked Ledger</label>
                        <select name="ledger_id" class="form-select rounded-3">
                            <option value="">— No Ledger —</option>
                            {% for l in ledgers %}
                            <option value="{{ l.id }}" {% if particular.ledger_id == l.id %}selected{% endif %}>{{ l.ledger_name }} ({{ l.ledger_group }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-dark">Description</label>
                        <textarea name="description" class="form-control rounded-3" rows="2">{{ particular.description or '' }}</textarea>
                    </div>
                    <div class="d-flex gap-3">
                        <a href="{{ url_for('expense_ledgers', tab='particulars') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                        <button type="submit" class="btn btn-warning rounded-pill px-5 fw-bold shadow-sm text-dark flex-grow-1">
                            <i class="bi bi-check2-circle me-2"></i>Update Particular
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
