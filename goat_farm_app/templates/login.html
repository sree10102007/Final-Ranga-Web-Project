<!DOCTYPE html>
<html>
<head>
    <link integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login</title>
</head>
<body class="bg-light d-flex align-items-center vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h3 class="fw-bold text-center mb-4">Goat Farm Manager</h3>
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}{% for c, m in messages %}<div class="alert alert-{{c}}">{{m}}</div>{% endfor %}{% endif %}
                {% endwith %}
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3"><label>Username</label><input type="text" name="username" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" name="password" id="password" class="form-control" required></div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="show_password">
                        <label class="form-check-label" for="show_password">Show Password</label>
                    </div>
                    <button class="btn btn-success w-100 mb-3" type="submit">Login</button>
                </form>
                <script nonce="{{ csp_nonce }}">
                document.addEventListener("DOMContentLoaded", function() {
                    var checkbox = document.getElementById("show_password");
                    if (checkbox) {
                        checkbox.addEventListener("change", function() {
                            var p = document.getElementById("password");
                            if (p) {
                                p.type = checkbox.checked ? "text" : "password";
                            }
                        });
                    }
                });
                </script>
            </div>
        </div>
    </div>
</div>
</body>
</html>
