<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <title>Two-Factor Authentication</title>
</head>
<body class="bg-light d-flex align-items-center vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h4 class="fw-bold text-center mb-3">Two-Factor Verification</h4>
                <p class="small text-muted text-center mb-4">Please enter the 6-digit verification code from your authenticator app, or enter a backup recovery code.</p>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}{% for c, m in messages %}<div class="alert alert-{{c}} small">{{m}}</div>{% endfor %}{% endif %}
                {% endwith %}
                
                <form method="POST" action="{{ url_for('auth.mfa_verify_login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Verification Code / Recovery Code</label>
                        <input type="text" name="code" class="form-control rounded-3 text-center fs-4 font-monospace" placeholder="123456" required autocomplete="off">
                    </div>
                    <button class="btn btn-success w-100 mb-3 py-2 rounded-3 fw-bold" type="submit">Verify Code</button>
                    <div class="text-center small"><a href="{{ url_for('auth.login') }}" class="text-muted">Back to Login</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
