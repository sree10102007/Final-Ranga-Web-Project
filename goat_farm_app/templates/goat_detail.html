{% extends 'layout.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center gap-3">
        <a href="{{ url_for('goats') }}" class="btn btn-outline-secondary rounded-circle" style="width: 40px; height: 40px; padding: 0; line-height: 38px; display: inline-flex; align-items: center; justify-content: center;"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold text-success mb-0"><i class="bi bi-tag"></i> Goat Details: {{ tag_number }}
            <span class="badge ms-2 {% if goat.status == 'Active' %}bg-primary{% elif goat.status == 'Sold' %}bg-warning{% else %}bg-danger{% endif %}" style="font-size: 1rem; vertical-align: middle;">
                {{ goat.status or 'Active' }}
            </span>
        </h2>
    </div>
</div>

<div class="card border-0 shadow-sm rounded-4">
    <div class="card-header bg-white border-bottom p-4 rounded-top-4">
        <h5 class="mb-0 fw-bold"><i class="bi bi-clock-history"></i> Unified History</h5>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Date</th>
                        <th>Type</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody>
                    {% for record in history %}
                    <tr>
                        <td class="ps-4 fw-medium">{{ record.date }}</td>
                        <td>{{ record.type }}</td>
                        <td>{{ record.notes }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">No records found for this goat.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
