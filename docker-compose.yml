services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ranga_farm_app
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: "1"
      SECRET_KEY: ${SECRET_KEY}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: goat_farm
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSLMODE: prefer
      LIMITER_STORAGE_URI: redis://redis:6379/0
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - app_logs:/app/goat_farm_app/logs
      - app_uploads:/app/goat_farm_app/static/uploads

  db:
    image: postgres:16-alpine
    container_name: ranga_farm_db
    environment:
      POSTGRES_DB: goat_farm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d goat_farm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ranga_farm_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  app_logs:
  app_uploads: