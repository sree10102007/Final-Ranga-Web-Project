# zap.conf — ZAP Baseline Scan Rule Configuration
# Format: <rule_id> <IGNORE|INFO|WARN|FAIL> [description]
#
# Strategy
# --------
# The CI workflow gates on HIGH severity (riskcode=3) only.
# All Medium (2), Low (1) and Informational (0) findings that are
# expected for a plain HTTP Flask development application are set to
# WARN or IGNORE here so they appear in the report but never cause
# Docker exit-code 2 regardless of the fail_action setting.
#
# Any new HIGH-severity finding NOT listed here will still cause DAST
# to fail via the workflow's jq severity gate — which is the desired
# security behaviour.
# -------------------------------------------------------------------------

# ── Medium (riskcode 2) — set to WARN ────────────────────────────────────
# These are structural issues expected on a dev HTTP app without TLS/CSP.

10016  WARN  Web Browser XSS Protection Not Enabled
10017  WARN  Cross-Domain JavaScript Source File Inclusion
10020  WARN  Missing Anti-clickjacking Header (X-Frame-Options)
10021  WARN  X-Content-Type-Options Header Missing
10038  WARN  Content Security Policy (CSP) Header Not Set
10055  WARN  CSP Scanner
10098  WARN  Cross-Domain Misconfiguration
90022  WARN  Application Error Disclosure

# ── Low (riskcode 1) — set to WARN ───────────────────────────────────────
10010  WARN  Cookie No HttpOnly Flag
10011  WARN  Cookie Without Secure Flag
10015  WARN  Incomplete or No Cache-control Header Set
10019  WARN  Content-Type Header Missing
10035  WARN  Strict-Transport-Security Header Not Set
10036  WARN  Server Leaks Version Information via Server HTTP Header
10037  WARN  Server Leaks Information via X-Powered-By Header
10054  WARN  Cookie without SameSite Attribute
10063  WARN  Permissions Policy Header Not Set
10096  WARN  Timestamp Disclosure - Unix
10108  WARN  Reverse Tabnabbing

# ── Informational (riskcode 0) — IGNORE ──────────────────────────────────
10023  IGNORE  Information Disclosure - Debug Error Messages
10024  IGNORE  Information Disclosure - Sensitive Information in URL
10025  IGNORE  Information Disclosure - Sensitive Information in HTTP Referrer Header
10027  IGNORE  Information Disclosure - Suspicious Comments
10049  IGNORE  Non-Storable Content
10050  IGNORE  Retrieved from Cache
10056  IGNORE  X-Debug-Token Information Leak
10094  IGNORE  Base64 Disclosure
10097  IGNORE  Hash Disclosure
10109  IGNORE  Modern Web Application
10110  IGNORE  Absence of Anti-CSRF Tokens
10111  IGNORE  Authentication Request Identified
10112  IGNORE  Session Management Response Identified
10113  IGNORE  Verification Request Identified
