name: Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight

jobs:
  secrets-scan:
    name: Secrets Leak Prevention
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan --baseline .secrets.baseline .
          git diff --exit-code .secrets.baseline

  supply-chain:
    name: Software Supply Chain Security
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r goat_farm_app/requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r goat_farm_app/requirements.txt

  sast:
    name: Static Application Security Testing (SAST)
    runs-on: ubuntu-latest
    needs: supply-chain
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install SAST Scanners
        run: |
          pip install bandit semgrep

      - name: Run Bandit
        run: |
          bandit -c bandit.yml -r goat_farm_app/ -f json -o bandit-results.json || true
          # Assert no Critical/High vulnerabilities
          bandit -c bandit.yml -lll -r goat_farm_app/

      - name: Run Semgrep
        run: |
          semgrep --config .semgrep.yml goat_farm_app/

  dast:
    name: Dynamic Application Security Testing (DAST)
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install App Dependencies
        run: |
          pip install -r goat_farm_app/requirements.txt

      - name: Start Application in Background
        env:
          FLASK_ENV: testing
          SECRET_KEY: test_secret_key_12345
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          # Start a mock or local version for dynamic baseline scans
          python goat_farm_app/Project_goatfarm.py &
          sleep 5 # Wait for app startup

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://127.0.0.1:5001/'
          rules_file_name: 'zap.conf'
          fail_action: true
