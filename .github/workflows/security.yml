name: Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight

jobs:
  secrets-scan:
    name: Secrets Leak Prevention
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          cp .secrets.baseline .secrets.baseline.old
          detect-secrets scan --baseline .secrets.baseline .
          python -c "
          import json, sys
          def get_hashes(path):
              with open(path) as f:
                  data = json.load(f)
              return {f.get('hashed_secret') for findings in data.get('results', {}).values() for f in findings if f.get('hashed_secret')}

          old_hashes = get_hashes('.secrets.baseline.old')
          new_hashes = get_hashes('.secrets.baseline')
          added = new_hashes - old_hashes
          if added:
              print('CRITICAL: New, unaudited secrets detected!')
              for secret_hash in added:
                  print(f'  New secret hash: {secret_hash}')
              sys.exit(1)
          print('No new secrets detected.')
          "

  supply-chain:
    name: Software Supply Chain Security
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r goat_farm_app/requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r goat_farm_app/requirements.txt

  sast:
    name: Static Application Security Testing (SAST)
    runs-on: ubuntu-latest
    needs: supply-chain
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install SAST Scanners
        run: |
          pip install bandit semgrep

      - name: Run Bandit
        run: |
          bandit -c bandit.yml -r goat_farm_app/ -f json -o bandit-results.json || true
          # Assert no Critical/High vulnerabilities
          bandit -c bandit.yml -lll -r goat_farm_app/

      - name: Run Semgrep
        run: |
          semgrep --config .semgrep.yml goat_farm_app/

  dast:
    name: Dynamic Application Security Testing (DAST)
    runs-on: ubuntu-latest
    needs: sast

    permissions:
      contents: read
      issues: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: goat_farm
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install App Dependencies
        run: |
          pip install -r goat_farm_app/requirements.txt

      # Poll until Postgres accepts connections (prevents "role does not exist")
      - name: Wait for Postgres to be ready
        run: |
          echo "Polling Postgres readiness..."
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres -d goat_farm; then
              echo "Postgres is ready!"
              break
            fi
            echo "  attempt $i/30 — sleeping 2s..."
            sleep 2
          done
          pg_isready -h localhost -p 5432 -U postgres -d goat_farm \
            || { echo "Postgres never became ready"; exit 1; }

      - name: Run Database Migrations and Seed
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: goat_farm
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SSLMODE: disable
        run: |
          python goat_farm_app/db_migration.py
          python goat_farm_app/seed_mock_data.py

      - name: Start Application in Background
        env:
          FLASK_ENV: testing
          SECRET_KEY: test_secret_key_ci_pipeline_12345
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: goat_farm
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SSLMODE: disable
          LIMITER_STORAGE_URI: memory://
        run: |
          export DB_ENCRYPTION_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          nohup python goat_farm_app/Project_goatfarm.py > /tmp/app.log 2>&1 &
          echo "App PID=$!"
          # Wait up to 60 seconds for the app to respond on port 5001
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5001/ > /dev/null 2>&1; then
              echo "App is successfully running!"
              exit 0
            fi
            echo "  waiting for app... attempt $i/60"
            sleep 1
          done
          echo "=== App failed to start. Last 50 log lines: ==="
          tail -50 /tmp/app.log || true
          exit 1

      # ZAP baseline scan — fail_action: false so Docker exit-code never kills
      # the job. The severity gate below determines pass/fail.
      - name: Run OWASP ZAP Baseline Scan
        id: zap
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://127.0.0.1:5001/'
          rules_file_name: 'zap.conf'
          fail_action: false
          cmd_options: '-J zap-report.json'

      # Always upload the report for inspection even if the step had errors
      - name: Upload ZAP Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            zap-report.json
            zap-report.html
          if-no-files-found: warn

      # Severity gate: ONLY fail on HIGH (riskcode=3).
      # Medium (2), Low (1), Informational (0) are expected on a dev HTTP app
      # and are handled in zap.conf. ZAP riskcodes in the JSON are strings.
      - name: Evaluate ZAP Results — fail on HIGH severity only
        if: always()
        run: |
          if [ ! -f zap-report.json ]; then
            echo "zap-report.json not found — treating as pass (no High alerts)."
            exit 0
          fi

          # ZAP JSON uses string riskcodes: "3"=High, "2"=Medium, "1"=Low, "0"=Info
          # We only gate on HIGH (riskcode "3")
          HIGH=$(jq '[
            .site[]?.alerts[]?
            | select((.riskcode | tostring) == "3")
          ] | length' zap-report.json 2>/dev/null || echo "0")

          echo "High-severity ZAP alerts: ${HIGH}"

          # Print a summary of all findings for the run log
          echo "--- All ZAP alerts ---"
          jq -r '.site[]?.alerts[]? | "[\(.riskdesc)] \(.name)"' zap-report.json 2>/dev/null | sort | uniq || true
          echo "----------------------"

          if [ "${HIGH}" -gt 0 ]; then
            echo "::error::ZAP found ${HIGH} HIGH-severity alert(s)."
            echo "Download the zap-baseline-report artifact to review details."
            jq '[.site[]?.alerts[]?
                 | select((.riskcode | tostring) == "3")
                 | {name, riskdesc, instances: (.instances | length)}]' zap-report.json || true
            exit 1
          fi

          echo "DAST passed — no HIGH-severity ZAP alerts found."

      - name: Create GitHub Issue on HIGH ZAP Alerts
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 DAST: HIGH-severity ZAP alert(s) — ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## OWASP ZAP Baseline Scan — HIGH Severity Alerts Found',
              '',
              `**Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Branch:** ${context.ref}`,
              `**Commit:** ${context.sha}`,
              '',
              'Download the **zap-baseline-report** artifact from the Actions run for full details.',
              '',
              '> Auto-generated by the Security Pipeline.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'dast'],
            });
