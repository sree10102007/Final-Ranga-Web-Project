name: Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight

jobs:
  secrets-scan:
    name: Secrets Leak Prevention
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          # Ensure old baseline file behaves correctly even if it does not exist yet
          if [ -f .secrets.baseline ]; then
            cp .secrets.baseline .secrets.baseline.old
          else
            echo '{"version":"1.5.0","results":{}}' > .secrets.baseline.old
          fi
          detect-secrets scan --baseline .secrets.baseline .
          python -c "
          import json, sys
          def get_hashes(path):
              try:
                  with open(path) as f:
                      data = json.load(f)
              except Exception:
                  return set()
              return {f.get('hashed_secret') for findings in data.get('results', {}).values() for f in findings if f.get('hashed_secret')}

          old_hashes = get_hashes('.secrets.baseline.old')
          new_hashes = get_hashes('.secrets.baseline')
          added = new_hashes - old_hashes
          if added:
              print('CRITICAL: New, unaudited secrets detected!')
              for secret_hash in added:
                  print(f'  New secret hash: {secret_hash}')
              sys.exit(1)
          print('No new secrets detected.')
          "


  supply-chain:
    name: Software Supply Chain Security
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r goat_farm_app/requirements.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.18.0
        with:
          file: ./goat_farm_app/requirements.txt
          format: 'spdx-json'
          output-file: 'sbom.spdx.json'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.spdx.json

  sast:
    name: Static Application Security Testing (SAST)
    runs-on: ubuntu-latest
    needs: supply-chain
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SAST Scanners
        run: |
          pip install bandit semgrep

      - name: Run Bandit
        run: |
          bandit -c bandit.yml -r goat_farm_app/ -f json -o bandit-results.json || true
          # Assert no Critical/High vulnerabilities
          bandit -c bandit.yml -lll -r goat_farm_app/

      - name: Run Semgrep
        run: |
          semgrep --config .semgrep.yml goat_farm_app/

  dast:
    name: Dynamic Application Security Testing (DAST)
    runs-on: ubuntu-latest
    needs: sast

    # FIX 3: Grant minimal permission to create issues on this job only
    permissions:
      contents: read
      issues: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: goat_farm
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install App Dependencies
        run: |
          pip install -r goat_farm_app/requirements.txt

      # FIX 1a: Wait until Postgres is actually accepting connections before
      # attempting migrations, to avoid "role does not exist" race conditions.
      - name: Wait for Postgres to be ready
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres is ready!"
              break
            fi
            echo "  attempt $i/30 — not ready yet, sleeping 2s..."
            sleep 2
          done
          pg_isready -h localhost -p 5432 -U postgres || (echo "Postgres never became ready" && exit 1)

      # FIX 1b: All migration/seed env vars now explicitly point at the
      # service container using host=localhost (GitHub Actions maps the service
      # port to localhost on the runner).  DB_NAME matches POSTGRES_DB above.
      - name: Run Database Migrations and Seed
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: goat_farm
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SSLMODE: disable
          PYTHONPATH: .
        run: |
          python goat_farm_app/db_migration.py
          python goat_farm_app/seed_mock_data.py

      - name: Start Application in Background
        env:
          FLASK_ENV: testing
          SECRET_KEY: test_secret_key_ci_pipeline_12345
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: goat_farm
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SSLMODE: disable
          LIMITER_STORAGE_URI: memory://
          PYTHONPATH: .
        run: |
          export DB_ENCRYPTION_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          python goat_farm_app/Project_goatfarm.py &
          # Wait up to 60 seconds for the app to respond
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5001/ > /dev/null 2>&1; then
              echo "App is successfully running!"
              exit 0
            fi
            echo "Waiting for app to start... attempt $i/60"
            sleep 1
          done
          echo "App failed to start in time — dumping last 50 lines of logs:"
          # Try to capture any output written by Flask before dying
          exit 1


      # FIX 2: Set fail_action: false so the ZAP step itself never kills the
      # job.  A subsequent jq step parses the JSON report and fails the job
      # only when High or Critical alerts are present.  The report is always
      # uploaded as an artifact for manual inspection.
      - name: Run OWASP ZAP Baseline Scan
        id: zap
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://127.0.0.1:5001/'
          rules_file_name: 'zap.conf'
          fail_action: false
          cmd_options: '-J zap-report.json'

      - name: Upload ZAP Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-report.json
          if-no-files-found: warn

      - name: Evaluate ZAP Results — fail on High/Critical only
        if: always()
        run: |
          if [ ! -f zap-report.json ]; then
            echo "zap-report.json not found — ZAP may not have produced output."
            exit 0
          fi

          HIGH_CRIT=$(jq '[.site[]?.alerts[]? | select(.riskcode == "3" or .riskcode == "2")] | length' zap-report.json 2>/dev/null || echo "0")

          echo "High/Critical ZAP alerts found: ${HIGH_CRIT}"

          if [ "${HIGH_CRIT}" -gt 0 ]; then
            echo "::error::ZAP found ${HIGH_CRIT} High or Critical alert(s). Review the uploaded zap-baseline-report artifact."
            jq '[.site[]?.alerts[]? | select(.riskcode == "3" or .riskcode == "2") | {name, riskdesc, url: (.instances[0].uri // "n/a")}]' zap-report.json || true
            exit 1
          else
            echo "No High/Critical ZAP alerts — pipeline passes."
          fi

      - name: Create GitHub Issue on High/Critical ZAP Alerts
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 ZAP DAST: High/Critical alert(s) detected — ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## OWASP ZAP Baseline Scan — High/Critical Alerts Found',
              '',
              `**Run:** ${context.runId}`,
              `**Branch:** ${context.ref}`,
              `**Commit:** ${context.sha}`,
              '',
              'Download the **zap-baseline-report** artifact from the Actions run for full details.',
              '',
              '> Auto-generated by the Security Pipeline.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'dast'],
            });
