name: Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight

jobs:
  secrets-scan:
    name: Secrets Leak Prevention
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          cp .secrets.baseline .secrets.baseline.old
          detect-secrets scan --baseline .secrets.baseline .
          diff <(jq --sort-keys 'del(.generated_at)' .secrets.baseline.old) <(jq --sort-keys 'del(.generated_at)' .secrets.baseline)

  supply-chain:
    name: Software Supply Chain Security
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r goat_farm_app/requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r goat_farm_app/requirements.txt

  sast:
    name: Static Application Security Testing (SAST)
    runs-on: ubuntu-latest
    needs: supply-chain
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install SAST Scanners
        run: |
          pip install bandit semgrep

      - name: Run Bandit
        run: |
          bandit -c bandit.yml -r goat_farm_app/ -f json -o bandit-results.json || true
          # Assert no Critical/High vulnerabilities
          bandit -c bandit.yml -lll -r goat_farm_app/

      - name: Run Semgrep
        run: |
          semgrep --config .semgrep.yml goat_farm_app/

  dast:
    name: Dynamic Application Security Testing (DAST)
    runs-on: ubuntu-latest
    needs: sast
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install App Dependencies
        run: |
          pip install -r goat_farm_app/requirements.txt

      - name: Run Database Migrations and Seed
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          python goat_farm_app/db_migration.py
          python goat_farm_app/seed_mock_data.py

      - name: Start Application in Background
        env:
          FLASK_ENV: testing
          SECRET_KEY: test_secret_key_12345
          DB_ENCRYPTION_KEY: ZrTHx00RLEIS8MtqdeQzH4xW-MeviPX0phLUX6s8sys=
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: postgres
          LIMITER_STORAGE_URI: memory://
        run: |
          python goat_farm_app/Project_goatfarm.py &
          # Wait up to 30 seconds for the app to respond
          for i in {1..30}; do
            if curl -s http://127.0.0.1:5001/ > /dev/null; then
              echo "App is successfully running!"
              exit 0
            fi
            echo "Waiting for app to start..."
            sleep 1
          done
          echo "App failed to start in time"
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://127.0.0.1:5001/'
          rules_file_name: 'zap.conf'
          fail_action: true
